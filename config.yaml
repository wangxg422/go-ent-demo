app:
  env: debug # debug、dev、test、prod
  name: entdemo
  service_addr: "0.0.0.0:80"
  timeout: 5

log:
  level: debug
  file: log/b5gpaas-backend.log
  format: console # console、 json
  max-size: 100 # 日志文件最大大小，单位：M
  max-age: 30 # 日志文件最长保存时间，单位：天
  max-backups: 10 # 最多保存多少个日志归档文件
  compress: true

database:
  enabled: true
  type: MySQL # MySQL、PostgreSQL
  address: localhost
  port: 3306
  username: root
  password: "123456"
  db-name: entdemo
  conn-config: charset=utf8mb4&parseTime=True&loc=Local
  enable-foreign-key: false # 是否启用数据库外键
  max-idle-conns: 2 # 最大空闲连接数
  max-open-conns: 10 # 最大打开连接数
  conn-max-lifetime: 30 # 连接的最大生命周期，单位：分钟
  conn-max-idle-time: 10 # 连接的最大空闲时间，单位：分钟
